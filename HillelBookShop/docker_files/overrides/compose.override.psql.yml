services:
  app:
    container_name: django_books_web_psql
    command: >
      sh -c "python manage.py migrate &&
         python manage.py collectstatic --noinput &&
         gunicorn core.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DB_TYPE: postgres
    env_file:
      - ../../.env.postgres
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy
        restart: true

  db:
    image: postgres:16-alpine
    env_file:
      - ../../.env.postgres
    ports:
      - "5432:5432"
    networks:
      - hillel_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5