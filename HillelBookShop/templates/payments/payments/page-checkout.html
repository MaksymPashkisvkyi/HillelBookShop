{% extends '../../base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block extra_header %}
<meta charset="UTF-8">
<meta name="viewport">
<title>Checkout</title>
<link href="{% static 'css/payments.css' %}" rel="stylesheet" type="text/css"/>
<script src="https://js.stripe.com/v3/"></script>
{% endblock %}

{% block content %}
<!-- Header-->
{% include '../../partials/header.html' %}
<!-- Navigation-->
{% include '../../partials/nav.html' %}


<section class="py-10">
    <div class="container">
        <h2 class="text-3xl mb-1">Оплата замовлення</h2>
    </div>
</section>
<section class="pb-10">
    <div class="container">
        <div class="col row-cols-2 lg:row-cols-3 gap-rows-8 max-sm:gap-1" id="product-list">
            <div class="mb-5">
                <label for="amount">Сума</label>
                <input readonly class="form-control" type="number" id="amount" value="{{ order.total_price }}">
            </div>
            <div class="mb-5">
                <label for="currency">Валюта</label>
                <select class="form-control" id="currency">
                    <option value="usd">USD</option>
                    <option value="eur">EUR</option>
                    <option value="uah" selected>UAH</option>
                </select>
            </div>
            <div class="mb-5">
                <label for="description">Опис платежу</label>
                <input class="form-control" id="description" type="text" placeholder="Опис платежу (опційно)">
            </div>
            <div class="mb-5">
                <label>Дані платежу</label>
                <div id="payment-element"></div>
            </div>
            <div class="mb-5">
                <button disabled id="submit-btn" class="btn btn-green" type="submit">Оплатити</button>
                <a id="home-btn" hidden href="{% url 'shop' %}" class="btn btn-primary">До каталогу</a>
            </div>
            <div id="message"></div>
        </div>
    </div>

</section>

<script>
    const STRIPE_PUBLIC_KEY = '{{ stripe_public_key }}';
    const API_URL = '/payments/payments';

    const stripe = Stripe(STRIPE_PUBLIC_KEY);
    let elements, paymentElement, clientSecret, paymentId;

    const submitBtn = document.getElementById('submit-btn');
    const homeBtn = document.getElementById('home-btn');
    const messageDiv = document.getElementById('message');

    async function createPaymentIntent() {
        const csrfToken = getCookie('csrftoken');
        const response = await fetch(`${API_URL}/create_payment_intent/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken,
            },
            body: JSON.stringify({
                amount: document.getElementById('amount').value,
                currency: document.getElementById('currency').value,
                description: document.getElementById('description').value,
            }),
        });
        if ( !response.ok  ) {
            const err = await response.json();
            throw new Error(err.error || `HTTP ${response.status}`);
        }
        const data = await response.json();
        if (!data.client_secret) {
            throw new Error(
                'Client secret is required!'
            )
        }
        clientSecret = data.client_secret;
        paymentId = data.payment_id;
        return data;
    }

    async function mountPaymentElement() {
        await createPaymentIntent();

        elements = stripe.elements({
            clientSecret: clientSecret,
            appearance: {theme: 'stripe'}
        });

        paymentElement = elements.create('payment', {layout: 'tabs'});
        paymentElement.mount('#payment-element');
        submitBtn.disabled = false;
    }

    async function handlePayment() {
        submitBtn.disabled = true;

        try {
            const {error, paymentIntent } = await stripe.confirmPayment({
                elements,
                confirmParams: {
                    return_url: window.location.origin + '/checkout/?success=true'
                },
                redirect: 'if_required',
            })

            if ( error ) {
                messageDiv.textContent = error.message;
            } else if ( paymentIntent && paymentIntent.status === 'succeeded' ) {
                messageDiv.textContent = 'Платіж успішно проведено, ID платежу: ' + paymentId;
                confirmOnBackend(paymentId);
            } else if ( paymentIntent ) {
                messageDiv.textContent = `Статус: ${paymentIntent.status}`;
            }
        } catch (err) {
            messageDiv.textContent = err.message;
        } finally {
            submitBtn.disabled = false;
        }
    }

    async function confirmOnBackend(payment) {
        try {
            await fetch (`${API_URL}/${paymentId}/confirm/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken'),
                },
            })
        } catch ( err ) {
            console.warn('Confirmation failed with: ', err);
        }
    }

    getCookie = (name) => {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if ( parts.length === 2 ) return parts.pop().split(';').shift();
        return '';
    }

    document.addEventListener('DOMContentLoaded', () => {
        submitBtn.addEventListener('click', handlePayment);
        mountPaymentElement().catch(err => {
            messageDiv.textContent = `Помилка ініціалізації: ${err.message}`
        })
    })

    if ( new URLSearchParams(window.location.search).get('success') === 'true' ) {
        document.addEventListener('DOMContentLoaded', () => {
            messageDiv.textContent = `Платіж оброблено успішно`;
        })
    }

</script>

{% endblock %}
